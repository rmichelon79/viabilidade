<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Viabilidade Econômica</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { margin: 0; background: #f1f5f9; color: #1e293b; }

    /* ─── SIDEBAR ─── */
    #sidebar {
      position: fixed; top: 0; left: 0; bottom: 0; width: 220px;
      background: #0f172a; display: flex; flex-direction: column;
      z-index: 100; box-shadow: 2px 0 8px rgba(0,0,0,.3);
    }
    .sidebar-logo {
      padding: 24px 20px 16px;
      border-bottom: 1px solid #1e293b;
    }
    .sidebar-logo-title {
      font-size: 0.7rem; font-weight: 600; letter-spacing: 0.12em;
      color: #64748b; text-transform: uppercase; margin-bottom: 4px;
    }
    .sidebar-logo-name {
      font-size: 1.1rem; font-weight: 700; color: #f8fafc;
    }
    .nav-section { padding: 20px 12px 8px; font-size: 0.65rem; font-weight: 700;
      letter-spacing: 0.1em; color: #475569; text-transform: uppercase; }
    .nav-link {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; margin: 2px 0; border-radius: 6px;
      color: #94a3b8; font-size: 0.875rem; font-weight: 500;
      cursor: pointer; text-decoration: none; transition: all .15s;
    }
    .nav-link:hover { background: #1e293b; color: #f1f5f9; }
    .nav-link.active { background: #2563eb; color: #fff; }
    .nav-link .nav-icon { font-size: 1rem; width: 20px; text-align: center; }
    .nav-link .nav-badge {
      margin-left: auto; font-size: 0.65rem; background: #334155;
      color: #94a3b8; padding: 1px 6px; border-radius: 10px;
    }
    .nav-link.active .nav-badge { background: #1d4ed8; color: #bfdbfe; }
    .sidebar-footer {
      margin-top: auto; padding: 16px 12px;
      border-top: 1px solid #1e293b;
    }
    #btn-reset {
      width: 100%; padding: 8px; background: transparent; border: 1px solid #334155;
      color: #64748b; border-radius: 6px; font-size: 0.75rem; cursor: pointer;
      transition: all .15s;
    }
    #btn-reset:hover { border-color: #dc2626; color: #dc2626; }

    /* ─── MAIN ─── */
    #main-content {
      margin-left: 220px; min-height: 100vh; padding: 32px 36px;
    }

    /* ─── PAGE LAYOUT ─── */
    .page-header { margin-bottom: 24px; }
    .page-title  { font-size: 1.5rem; font-weight: 700; color: #0f172a; margin: 0 0 4px; }
    .page-sub    { font-size: 0.875rem; color: #64748b; margin: 0; }

    .sections-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(480px, 1fr));
      gap: 16px;
    }

    /* ─── CARD ─── */
    .card {
      background: #fff; border-radius: 10px; padding: 20px 24px;
      box-shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
    }
    .card-title {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em;
      color: #475569; text-transform: uppercase; margin-bottom: 16px;
    }

    /* ─── FORM FIELDS ─── */
    .field-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 0; border-bottom: 1px solid #f1f5f9; gap: 12px;
    }
    .field-row:last-child { border-bottom: none; }
    .fl { font-size: 0.8rem; color: #374151; flex: 1; min-width: 0; }
    .fi {
      border: 1px solid #d1d5db; border-radius: 6px; padding: 5px 10px;
      font-size: 0.85rem; color: #0f172a; outline: none; transition: border .15s;
      width: 100%;
    }
    .fi:focus { border-color: #2563eb; box-shadow: 0 0 0 2px #2563eb22; }
    .fi.w80  { width: 80px; }
    .fi.w100 { width: 100px; }
    .fi-unit { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .unit { font-size: 0.75rem; color: #64748b; white-space: nowrap; }
    .divider { border: none; border-top: 1px solid #e2e8f0; margin: 8px 0; }
    .calc-row .fl { color: #64748b; font-style: italic; }
    .fv { font-size: 0.85rem; font-weight: 600; color: #1e40af; white-space: nowrap; }

    /* ─── TABLES ─── */
    .data-table {
      width: 100%; border-collapse: collapse; font-size: 0.8rem;
    }
    .data-table th {
      text-align: left; padding: 8px 10px; background: #f8fafc;
      border-bottom: 2px solid #e2e8f0; font-weight: 600; color: #374151;
      font-size: 0.75rem;
    }
    .data-table td {
      padding: 7px 10px; border-bottom: 1px solid #f1f5f9; vertical-align: middle;
    }
    .data-table tr:hover td { background: #fafafa; }
    .total-row td { background: #f8fafc; font-weight: 600; }
    .td-input {
      border: 1px solid #e2e8f0; border-radius: 4px; padding: 4px 6px;
      font-size: 0.8rem; color: #0f172a; background: #fff; outline: none; width: 100%;
    }
    .td-input:focus { border-color: #2563eb; }
    .td-num { text-align: right; width: 80px; }
    .td-wide { width: 140px; }
    .td-calc { color: #374151; font-weight: 500; text-align: right; }
    .comp-table td { color: #374151; }
    .comp-table td:not(:first-child) { text-align: right; font-variant-numeric: tabular-nums; }

    /* ─── BUTTONS ─── */
    .btn-add {
      background: #2563eb; color: #fff; border: none; border-radius: 6px;
      padding: 7px 14px; font-size: 0.8rem; font-weight: 500; cursor: pointer;
      transition: background .15s;
    }
    .btn-add:hover { background: #1d4ed8; }
    .btn-del {
      background: none; border: none; color: #94a3b8; cursor: pointer;
      font-size: 0.9rem; padding: 2px 6px; border-radius: 4px;
      transition: color .15s;
    }
    .btn-del:hover { color: #dc2626; }
    .btn-sm {
      background: #f1f5f9; border: 1px solid #e2e8f0; color: #374151;
      border-radius: 6px; padding: 5px 10px; font-size: 0.75rem; cursor: pointer;
    }
    .btn-sm:hover { background: #e2e8f0; }

    /* ─── KPI CARDS ─── */
    .kpi-3col {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 0;
    }
    @media (max-width: 1100px) { .kpi-3col { grid-template-columns: 1fr; } }
    .kpi-card {
      background: #fff; border-radius: 10px; padding: 20px 20px 16px;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
    }
    .kpi-scenario { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; margin-bottom: 14px; }
    .kpi-block { margin-bottom: 12px; }
    .kpi-label { font-size: 0.7rem; color: #64748b; margin-bottom: 2px; }
    .kpi-value { font-size: 1rem; font-weight: 700; color: #0f172a; }
    .kpi-value.pos { color: #16a34a; }
    .kpi-value.neg { color: #dc2626; }
    .kpi-row { display: flex; gap: 24px; flex-wrap: wrap; }
    .kpi-mini { flex: 1; min-width: 120px; }
    .kpi-mini-label { font-size: 0.7rem; color: #64748b; margin-bottom: 2px; }
    .kpi-mini-val { font-size: 0.95rem; font-weight: 700; color: #0f172a; }
    .info-label { font-size: 0.7rem; color: #64748b; }

    /* ─── ABS TABLE ─── */
    .abs-table { font-size: 0.78rem; }
    .abs-table th { padding: 5px 8px; }
    .abs-table td { padding: 3px 6px; }
    .abs-table .td-num { width: 70px; }

    /* ─── COLORS ─── */
    .pos { color: #16a34a; }
    .neg { color: #dc2626; }

    /* ─── DADOS DO ESTUDO stacked fields ─── */
    .field-stack { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
    .field-stack:last-child { margin-bottom: 0; }
    .field-stack .fl-s { font-size: 0.75rem; color: #64748b; font-weight: 500; }
    .field-stack .fi { width: 100%; }

    /* ─── MODAL ─── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 500;
    }
    .modal-overlay.hidden { display: none; }
    .modal-box {
      background: #fff; border-radius: 12px; padding: 28px 32px;
      width: 480px; max-width: 95vw; max-height: 80vh;
      display: flex; flex-direction: column;
      box-shadow: 0 8px 32px rgba(0,0,0,.2);
    }
    .modal-title { font-size: 1rem; font-weight: 700; color: #0f172a; margin-bottom: 20px; }
    .modal-body  { overflow-y: auto; flex: 1; }
    .modal-footer { margin-top: 20px; display: flex; gap: 8px; justify-content: flex-end; }
    .saved-item {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 12px; border-radius: 8px; border: 1px solid #e2e8f0;
      margin-bottom: 8px; cursor: pointer; transition: background .12s;
    }
    .saved-item:hover { background: #f1f5f9; }
    .saved-item-info { flex: 1; min-width: 0; }
    .saved-item-name { font-size: 0.875rem; font-weight: 600; color: #0f172a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .saved-item-date { font-size: 0.75rem; color: #64748b; }
    .saved-item-del  { background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 1rem; padding: 2px 6px; border-radius: 4px; }
    .saved-item-del:hover { color: #dc2626; }
    .modal-empty { text-align: center; color: #94a3b8; font-size: 0.875rem; padding: 32px 0; }

    /* ─── SIDEBAR ACTIONS ─── */
    .sidebar-actions { padding: 0 12px 12px; display: flex; flex-direction: column; gap: 6px; }
    .btn-sidebar {
      width: 100%; padding: 8px; background: transparent; border: 1px solid #334155;
      color: #94a3b8; border-radius: 6px; font-size: 0.75rem; cursor: pointer;
      transition: all .15s; text-align: left; display: flex; align-items: center; gap: 8px;
    }
    .btn-sidebar:hover { border-color: #2563eb; color: #93c5fd; }
    .btn-sidebar-label { position: relative; overflow: hidden; }
    .btn-sidebar-label input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%;
    }

    /* ─── PRINT ─── */
    @media print {
      #sidebar, .page-header .btn-export, .no-print { display: none !important; }
      #main-content { margin-left: 0 !important; padding: 16px !important; }
      body { background: #fff !important; }
      .kpi-3col { grid-template-columns: repeat(3,1fr) !important; }
      .card { box-shadow: none !important; border: 1px solid #e2e8f0 !important; break-inside: avoid; }
      canvas { max-height: 250px !important; }
    }
  </style>
</head>
<body>

<!-- Sidebar -->
<nav id="sidebar">
  <div class="sidebar-logo">
    <div class="sidebar-logo-title">Sopra Incorporações</div>
    <div class="sidebar-logo-name">Viabilidade</div>
  </div>

  <div class="nav-section">Estudo</div>
  <a class="nav-link" data-page="premissas" href="#premissas">
    <span class="nav-icon">⚙️</span> Premissas
  </a>
  <a class="nav-link" data-page="tabela" href="#tabela">
    <span class="nav-icon">🏢</span> Tabela de Preços
  </a>
  <a class="nav-link" data-page="cenarios" href="#cenarios">
    <span class="nav-icon">📊</span> Cenários
  </a>

  <div class="nav-section" style="margin-top:8px">Análise</div>
  <a class="nav-link" data-page="resultados" href="#resultados">
    <span class="nav-icon">📈</span> Resultados
  </a>

  <div class="sidebar-actions">
    <button class="btn-sidebar" id="btn-save">💾 Salvar análise</button>
    <button class="btn-sidebar" id="btn-open">📂 Análises salvas</button>
    <label class="btn-sidebar btn-sidebar-label">
      ⬆ Importar JSON
      <input type="file" id="btn-import" accept=".json">
    </label>
  </div>
  <div class="sidebar-footer">
    <button id="btn-reset">↺ Resetar dados</button>
  </div>
</nav>

<!-- Main content -->
<main id="main-content"></main>

<!-- Modal overlay -->
<div id="modal-overlay" class="modal-overlay hidden">
  <div class="modal-box">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-body"  id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
