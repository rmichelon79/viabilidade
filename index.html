<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Viabilidade Econômica</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Serif+Display&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* Padrão visual Sopra (Sistema de Design): papel claro, verde mostarda, DM fonts. */
    :root{
      --papel:#F7F5F0; --card:#FFFFFF; --tinta:#22201B; --tinta-suave:#4A463D; --muted:#7C7568;
      --linha:#E4DED2; --linha-2:#D8D0C1; --linha-suave:#EFEAE0;
      --mostarda:#7AA436; --oliva:#5A7A1F; --oliva-hover:#4C6B1B; --oliva-wash:#EEF0DC;
      --pos:#16A34A; --neg:#DC2626;
      /* sidebar escuro quente */
      --sb-bg:#22201B; --sb-line:#33302A; --sb-txt:#A8A093; --sb-dim:#8C857A;
      --sb-name:#F0EADD; --sb-hover:#33302A;
    }
    *, *::before, *::after { box-sizing: border-box; font-family: 'DM Sans', system-ui, sans-serif; }
    body { margin: 0; background: var(--papel); color: var(--tinta); -webkit-font-smoothing: antialiased; }

    /* ─── SIDEBAR ─── */
    #sidebar {
      position: fixed; top: 0; left: 0; bottom: 0; width: 220px;
      background: var(--sb-bg); display: flex; flex-direction: column;
      z-index: 100; box-shadow: 2px 0 8px rgba(0,0,0,.18);
    }
    .sidebar-logo {
      padding: 24px 20px 16px;
      border-bottom: 1px solid var(--sb-line);
    }
    .sidebar-logo-title {
      font-size: 0.7rem; font-weight: 600; letter-spacing: 0.12em;
      color: var(--sb-dim); text-transform: uppercase; margin-bottom: 4px;
    }
    .sidebar-logo-name {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 1.35rem; color: var(--sb-name);
    }
    .nav-section { padding: 20px 12px 8px; font-size: 0.65rem; font-weight: 700;
      letter-spacing: 0.1em; color: var(--sb-dim); text-transform: uppercase; }
    .nav-link {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; margin: 2px 0; border-radius: 6px;
      color: var(--sb-txt); font-size: 0.875rem; font-weight: 500;
      cursor: pointer; text-decoration: none; transition: all .15s;
    }
    .nav-link:hover { background: var(--sb-hover); color: var(--sb-name); }
    .nav-link.active { background: var(--mostarda); color: #22201B; font-weight: 700; }
    .nav-link .nav-icon { font-size: 1rem; width: 20px; text-align: center; }
    .nav-link .nav-badge {
      margin-left: auto; font-size: 0.65rem; background: #413A2D;
      color: var(--sb-txt); padding: 1px 6px; border-radius: 10px;
    }
    .nav-link.active .nav-badge { background: var(--oliva-hover); color: var(--oliva-wash); }
    .sidebar-footer {
      margin-top: auto; padding: 16px 12px;
      border-top: 1px solid var(--sb-line);
    }
    #btn-reset {
      width: 100%; padding: 8px; background: transparent; border: 1px solid #413A2D;
      color: var(--sb-dim); border-radius: 6px; font-size: 0.75rem; cursor: pointer;
      transition: all .15s;
    }
    #btn-reset:hover { border-color: var(--neg); color: var(--neg); }

    /* ─── MAIN ─── */
    #main-content {
      margin-left: 220px; min-height: 100vh; padding: 32px 36px;
    }

    /* ─── PAGE LAYOUT ─── */
    .page-header { margin-bottom: 24px; }
    .page-title  { font-family: 'DM Serif Display', Georgia, serif; font-size: 1.9rem; color: var(--tinta); margin: 0 0 4px; letter-spacing: -.2px; }
    .page-sub    { font-size: 0.875rem; color: var(--muted); margin: 0; }

    .sections-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(480px, 1fr));
      gap: 16px;
    }

    /* ─── CARD ─── */
    .card {
      background: var(--card); border: 1px solid var(--linha); border-radius: 12px; padding: 20px 24px;
      box-shadow: 0 1px 2px rgba(34,31,26,.04), 0 10px 30px rgba(34,31,26,.05);
    }
    .card-title {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em;
      color: var(--muted); text-transform: uppercase; margin-bottom: 16px;
    }

    /* ─── FORM FIELDS ─── */
    .field-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 0; border-bottom: 1px solid var(--linha-suave); gap: 12px;
    }
    .field-row:last-child { border-bottom: none; }
    .fl { font-size: 0.8rem; color: var(--tinta-suave); flex: 1; min-width: 0; }
    .fi {
      border: 1px solid var(--linha-2); border-radius: 6px; padding: 5px 10px;
      font-size: 0.85rem; color: var(--tinta); outline: none; transition: border .15s;
      width: 100%; background: var(--papel);
    }
    .fi:focus { border-color: var(--mostarda); box-shadow: 0 0 0 3px var(--oliva-wash); }
    .fi.w80  { width: 80px; }
    .fi.w100 { width: 100px; }
    .fi-unit { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .unit { font-size: 0.75rem; color: var(--muted); white-space: nowrap; }
    .divider { border: none; border-top: 1px solid var(--linha); margin: 8px 0; }
    .calc-row .fl { color: var(--muted); font-style: italic; }
    .fv { font-size: 0.85rem; font-weight: 600; color: var(--oliva); white-space: nowrap; }

    /* ─── TABLES ─── */
    .data-table {
      width: 100%; border-collapse: collapse; font-size: 0.8rem;
    }
    .data-table th {
      text-align: left; padding: 8px 10px; background: var(--papel);
      border-bottom: 2px solid var(--linha); font-weight: 600; color: var(--tinta-suave);
      font-size: 0.75rem;
    }
    .data-table td {
      padding: 7px 10px; border-bottom: 1px solid var(--linha-suave); vertical-align: middle;
    }
    .data-table tr:hover td { background: var(--papel); }
    .total-row td { background: var(--linha-suave); font-weight: 600; }
    .td-input {
      border: 1px solid var(--linha); border-radius: 4px; padding: 4px 6px;
      font-size: 0.8rem; color: var(--tinta); background: var(--card); outline: none; width: 100%;
    }
    .td-input:focus { border-color: var(--mostarda); }
    .td-num { text-align: right; width: 80px; }
    .td-wide { width: 140px; }
    .td-calc { color: var(--tinta-suave); font-weight: 500; text-align: right; }
    .comp-table td { color: var(--tinta-suave); }
    .comp-table td:not(:first-child) { text-align: right; font-variant-numeric: tabular-nums; }

    /* ─── BUTTONS ─── */
    .btn-add {
      background: var(--oliva); color: #fff; border: none; border-radius: 6px;
      padding: 7px 14px; font-size: 0.8rem; font-weight: 500; cursor: pointer;
      transition: background .15s;
    }
    .btn-add:hover { background: var(--oliva-hover); }
    .btn-del {
      background: none; border: none; color: #A8A093; cursor: pointer;
      font-size: 0.9rem; padding: 2px 6px; border-radius: 4px;
      transition: color .15s;
    }
    .btn-del:hover { color: var(--neg); }
    .btn-sm {
      background: var(--linha-suave); border: 1px solid var(--linha); color: var(--tinta-suave);
      border-radius: 6px; padding: 5px 10px; font-size: 0.75rem; cursor: pointer;
    }
    .btn-sm:hover { background: var(--linha); }

    /* ─── KPI CARDS ─── */
    .kpi-3col {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 0;
    }
    @media (max-width: 1100px) { .kpi-3col { grid-template-columns: 1fr; } }
    .kpi-card {
      background: var(--card); border: 1px solid var(--linha); border-radius: 12px; padding: 20px 20px 16px;
      box-shadow: 0 1px 2px rgba(34,31,26,.04), 0 10px 30px rgba(34,31,26,.05);
    }
    .kpi-scenario { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; margin-bottom: 14px; }
    .kpi-block { margin-bottom: 12px; }
    .kpi-label { font-size: 0.7rem; color: var(--muted); margin-bottom: 2px; }
    .kpi-value { font-size: 1rem; font-weight: 700; color: var(--tinta); }
    .kpi-value.pos { color: var(--pos); }
    .kpi-value.neg { color: var(--neg); }
    .kpi-row { display: flex; gap: 24px; flex-wrap: wrap; }
    .kpi-mini { flex: 1; min-width: 120px; }
    .kpi-mini-label { font-size: 0.7rem; color: var(--muted); margin-bottom: 2px; }
    .kpi-mini-val { font-size: 0.95rem; font-weight: 700; color: var(--tinta); }
    .info-label { font-size: 0.7rem; color: var(--muted); }

    /* ─── ABS TABLE ─── */
    .abs-table { font-size: 0.78rem; }
    .abs-table th { padding: 5px 8px; }
    .abs-table td { padding: 3px 6px; }
    .abs-table .td-num { width: 70px; }

    /* ─── COLORS ─── */
    .pos { color: var(--pos); }
    .neg { color: var(--neg); }

    /* ─── DADOS DO ESTUDO stacked fields ─── */
    .field-stack { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
    .field-stack:last-child { margin-bottom: 0; }
    .field-stack .fl-s { font-size: 0.75rem; color: var(--muted); font-weight: 500; }
    .field-stack .fi { width: 100%; }

    /* ─── MODAL ─── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(34,31,26,.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 500;
    }
    .modal-overlay.hidden { display: none; }
    .modal-box {
      background: var(--card); border-radius: 14px; padding: 28px 32px;
      width: 480px; max-width: 95vw; max-height: 80vh;
      display: flex; flex-direction: column;
      box-shadow: 0 8px 32px rgba(34,31,26,.2);
    }
    .modal-title { font-family: 'DM Serif Display', Georgia, serif; font-size: 1.3rem; color: var(--tinta); margin-bottom: 20px; }
    .modal-body  { overflow-y: auto; flex: 1; }
    .modal-footer { margin-top: 20px; display: flex; gap: 8px; justify-content: flex-end; }
    .saved-item {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 12px; border-radius: 8px; border: 1px solid var(--linha);
      margin-bottom: 8px; cursor: pointer; transition: background .12s;
    }
    .saved-item:hover { background: var(--papel); }
    .saved-item-info { flex: 1; min-width: 0; }
    .saved-item-name { font-size: 0.875rem; font-weight: 600; color: var(--tinta); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .saved-item-date { font-size: 0.75rem; color: var(--muted); }
    .saved-item-del  { background: none; border: none; color: #A8A093; cursor: pointer; font-size: 1rem; padding: 2px 6px; border-radius: 4px; }
    .saved-item-del:hover { color: var(--neg); }
    .modal-empty { text-align: center; color: #A8A093; font-size: 0.875rem; padding: 32px 0; }

    /* ─── SIDEBAR ACTIONS ─── */
    .sidebar-actions { padding: 0 12px 12px; display: flex; flex-direction: column; gap: 6px; }
    .btn-sidebar {
      width: 100%; padding: 8px; background: transparent; border: 1px solid #413A2D;
      color: var(--sb-txt); border-radius: 6px; font-size: 0.75rem; cursor: pointer;
      transition: all .15s; text-align: left; display: flex; align-items: center; gap: 8px;
    }
    .btn-sidebar:hover { border-color: var(--mostarda); color: #B9CB78; }
    .btn-sidebar-label { position: relative; overflow: hidden; }
    .btn-sidebar-label input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%;
    }

    /* ─── FLUXO TABLE ─── */
    .fc-table th, .fc-table td { white-space: nowrap; }
    .th-r { text-align: right; }
    .td-r { text-align: right; font-variant-numeric: tabular-nums; padding-right: 14px; }
    .neg-val { color: var(--neg); }
    .fc-row-lanc td { background: #F4F6EA !important; }
    .fc-row-entr td { background: #FAF3D8 !important; }
    .fc-table tbody tr:hover td { background: var(--papel); }

    /* ─── PRINT ─── */
    @media print {
      #sidebar, .page-header .btn-export, .no-print { display: none !important; }
      #main-content { margin-left: 0 !important; padding: 16px !important; }
      body { background: #fff !important; }
      .kpi-3col { grid-template-columns: repeat(3,1fr) !important; }
      .card { box-shadow: none !important; border: 1px solid var(--linha) !important; break-inside: avoid; }
      canvas { max-height: 250px !important; }
    }
  </style>
</head>
<body>

<!-- Sidebar -->
<nav id="sidebar">
  <div class="sidebar-logo">
    <div class="sidebar-logo-title">Sopra Incorporações</div>
    <div class="sidebar-logo-name">Viabilidade</div>
  </div>

  <div class="nav-section">Estudo</div>
  <a class="nav-link" data-page="premissas" href="#premissas">
    <span class="nav-icon">⚙️</span> Premissas
  </a>
  <a class="nav-link" data-page="tabela" href="#tabela">
    <span class="nav-icon">🏢</span> Tabela de Preços
  </a>
  <a class="nav-link" data-page="cenarios" href="#cenarios">
    <span class="nav-icon">📊</span> Cenários
  </a>

  <div class="nav-section" style="margin-top:8px">Análise</div>
  <a class="nav-link" data-page="resultados" href="#resultados">
    <span class="nav-icon">📈</span> Resultados
  </a>
  <a class="nav-link" data-page="fluxo" href="#fluxo">
    <span class="nav-icon">📋</span> Fluxo de Caixa
  </a>

  <div class="sidebar-actions">
    <button class="btn-sidebar" id="btn-save">💾 Salvar análise</button>
    <button class="btn-sidebar" id="btn-open">📂 Análises salvas</button>
    <!-- Importar/Exportar de dados agora ficam centralizados no Portal (Backup) -->
  </div>
  <div class="sidebar-footer" style="display:flex;flex-direction:column;gap:6px">
    <button id="btn-portal" onclick="location.href='https://rmichelon79.github.io/sopra-portal/'" style="width:100%;padding:9px;background:#7AA436;border:1px solid #7AA436;color:#22201B;border-radius:6px;font-size:0.8rem;font-weight:700;cursor:pointer;transition:all .15s">⌂ Voltar ao Portal</button>
    <button id="btn-logout" style="width:100%;padding:8px;background:transparent;
      border:1px solid #413A2D;color:#8C857A;border-radius:6px;font-size:0.75rem;
      cursor:pointer;transition:all .15s"
      onmouseover="this.style.borderColor='#7C7568';this.style.color='#A8A093'"
      onmouseout="this.style.borderColor='#413A2D';this.style.color='#8C857A'">
      🔒 Sair
    </button>
  </div>
</nav>

<!-- Main content -->
<main id="main-content"></main>

<!-- Modal overlay -->
<div id="modal-overlay" class="modal-overlay hidden">
  <div class="modal-box">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-body"  id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
